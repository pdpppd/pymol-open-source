[workspace]
channels = ["conda-forge", "schrodinger"]
name = "pymol-open-source"
platforms = ["linux-64", "win-64", "osx-arm64"]

[tasks]
build = "python setup.py build_ext --inplace"
clean-build = "rm -rf build && python setup.py build_ext --inplace"
all-tests = "pymol -ckqyr testing/runall.pml"

[dependencies]
python = ">=3.13.7,<3.14"
freetype = ">=2.14.1,<3"
glew = ">=2.1.0,<3"
libpng = ">=1.6.50,<2"
libxml2 = ">=2.13.8,<3"
numpy = ">=2.3.3,<3"
pyqt6 = ">=6.8.1,<7"
requests = ">=2.32.5,<3"
catch2 = ">=2.13.3,<3"
libnetcdf = ">=4.9.3,<5"
glm = ">=1.0.1,<2"
vtk-m = ">=2.3.0,<3"
cmake = ">=4.1.2,<5"
ninja = ">=1.13.1,<2"
pytest = ">=9.0.2,<10"
biopython = ">=1.85,<2"
collada2gltf = ">=2.1.4,<3"
pycollada = ">=0.9.2,<0.10"
pillow = ">=11.3.0,<12"
mpeg_encode = ">=1,<2"
pip = ">=25.2,<26"

[target.linux-64.dependencies]
libgl-devel = ">=1.7.0,<2"
